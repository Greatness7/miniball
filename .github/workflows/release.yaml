name: release
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: ${{ github.ref }}
  build:
    needs: setup
    strategy:
      matrix:
        os: [macos-latest, macos-15-intel, ubuntu-latest, windows-latest]
        include:
          - os: macos-latest
            archive: macos-latest.zip
          - os: macos-15-intel
            archive: macos-15-intel.zip
          - os: ubuntu-latest
            archive: ubuntu-latest.zip
          - os: windows-latest
            archive: windows-latest.zip
    defaults:
      run:
        working-directory: python
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: build
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          command: build
          args: --release

      - name: compress
        run: 7z a -tzip ${{matrix.archive}} ./target/wheels/*

      - name: upload
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
        with:
          files: python/${{matrix.archive}}
